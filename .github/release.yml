# Configuration for GitHub's auto-generated release notes.
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: ⚠️ Breaking changes
      labels: [breaking]
    - title: ✨ Features
      labels: [enhancement, feature]
    - title: 🐛 Fixes
      labels: [bug, fix]
    - title: 📚 Documentation
      labels: [documentation]
    - title: 🧰 Maintenance
      labels: [chore, dependencies]
    - title: Other changes
      labels: ["*"]
